<!DOCTYPE html>
<html>
<head>
    <title>KING PRIVATE WEBSITE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: red;
            color: white;
            cursor: pointer;
        }
        #content {
            display: none;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>ENTER PASSWORD</h1>

<input type="password" id="password" placeholder="Enter Password">
<button onclick="checkPassword()">Enter</button>

<div id="content">
    <h2>WELCOME KING 👑</h2>
    <p>This is your private website.</p>
</div>

<script>
function checkPassword() {
    var pass = document.getElementById("password").value;
    if(pass === "KING HERE") {
        document.getElementById("content").style.display = "block";
    } else {
        alert("Wrong Password!");
    }
}
</script>

</body>
</html>
